<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Savers | Partnership Inquiry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="noise"></div>
  <main class="container">
    <header class="hero">
      <h1 class="hero-title">Let's Build <span>Together</span></h1>
      <p class="hero-subtitle">Expand your horizons with Project Savers. Fill out the form below for partnership inquiries.</p>
    </header>

    <section class="form-card">
      <form id="partnership-form" action="https://formspree.io/f/xeelwyjq" method="POST">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="John Doe" required />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="john@example.com" required />
        </div>

        <div class="form-group">
          <label for="inquiry-type">Inquiry Type</label>
          <select id="inquiry-type" name="inquiry-type" required>
            <option value="" disabled selected>Select an option</option>
            <option value="strategic-partnership">Strategic Partnership</option>
            <option value="business-development">Business Development</option>
            <option value="co-marketing">Co-marketing</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="message">Your Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Tell us about your vision..." required></textarea>
        </div>

        <button type="submit" class="submit-btn">
          <span>Send Inquiry</span>
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </form>
      <div id="form-status" class="status-message"></div>
    </section>
  </main>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
